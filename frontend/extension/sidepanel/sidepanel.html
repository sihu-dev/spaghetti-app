<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Spaghetti - Theme Manager</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">🍝</div>
      <h1>AI Spaghetti</h1>
      <p class="subtitle">Theme Manager</p>
    </header>

    <!-- Search/Filter Bar -->
    <div class="search-section">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="테마 검색...">
        <button id="clearSearchBtn" class="clear-btn hidden">✕</button>
      </div>
      <div class="filter-options">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="recent">최근</button>
        <button class="filter-btn" data-filter="favorites">즐겨찾기</button>
      </div>
    </div>

    <!-- Current Theme Section -->
    <section class="current-theme-section">
      <div class="section-header">
        <h2 class="section-title">현재 테마</h2>
        <button id="captureBtn" class="icon-btn" title="현재 페이지에서 추출">📸</button>
      </div>

      <div id="currentThemeContent" class="current-theme-content">
        <div class="empty-state">
          <span class="empty-icon">🎨</span>
          <p>테마가 선택되지 않았습니다</p>
          <small>페이지에서 테마를 추출하거나 저장된 테마를 선택하세요</small>
        </div>
      </div>
    </section>

    <!-- Theme History List -->
    <section class="themes-section">
      <div class="section-header">
        <h2 class="section-title">저장된 테마 (<span id="themeCount">0</span>)</h2>
        <button id="refreshBtn" class="icon-btn" title="새로고침">🔄</button>
      </div>

      <div id="themesList" class="themes-list">
        <!-- Theme cards will be dynamically inserted here -->
      </div>

      <div id="emptyThemes" class="empty-state hidden">
        <span class="empty-icon">📦</span>
        <p>저장된 테마가 없습니다</p>
        <small>팝업에서 테마를 추출하고 저장하세요</small>
      </div>
    </section>

    <!-- Quick Actions Footer -->
    <footer class="footer">
      <button id="openPopupBtn" class="footer-btn">
        <span>🎨</span>
        테마 추출
      </button>
      <button id="openOptionsBtn" class="footer-btn">
        <span>⚙️</span>
        설정
      </button>
    </footer>
  </div>

  <!-- Theme Preview Modal -->
  <div id="previewModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="previewTitle">테마 미리보기</h3>
        <button id="closePreviewBtn" class="close-btn">✕</button>
      </div>
      <div id="previewBody" class="modal-body">
        <!-- Preview content will be inserted here -->
      </div>
      <div class="modal-footer">
        <button id="previewApplyBtn" class="modal-btn primary">적용</button>
        <button id="previewCopyBtn" class="modal-btn secondary">CSS 복사</button>
        <button id="previewDeleteBtn" class="modal-btn danger">삭제</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
