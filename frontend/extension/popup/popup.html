<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Spaghetti Theme Extractor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">🍝</div>
      <h1>AI Spaghetti</h1>
      <p class="subtitle">Theme Extractor</p>
    </header>

    <main class="main-content">
      <!-- 캡처 버튼 -->
      <section class="capture-section">
        <button id="captureBtn" class="capture-btn">
          <span class="btn-icon">📸</span>
          현재 페이지 캡처
        </button>
      </section>

      <!-- 이미지 업로드 섹션 -->
      <section class="upload-section">
        <div class="upload-area" id="uploadArea">
          <input type="file" id="imageInput" accept="image/*" hidden>
          <div class="upload-content">
            <span class="upload-icon">🖼️</span>
            <p>이미지를 드래그하거나 클릭하여 업로드</p>
          </div>
          <img id="previewImage" class="preview-image hidden" alt="Preview">
        </div>
      </section>

      <!-- 추출 버튼 -->
      <button id="extractBtn" class="extract-btn" disabled>
        <span class="btn-icon">🎨</span>
        색상 추출하기
      </button>

      <!-- 로딩 상태 -->
      <div id="loadingState" class="loading-state hidden">
        <div class="spinner"></div>
        <p>색상을 분석 중...</p>
      </div>

      <!-- 결과 섹션 -->
      <section id="resultSection" class="result-section hidden">
        <h2>추출된 색상 팔레트</h2>
        <div class="color-palette" id="colorPalette"></div>
        <p class="palette-hint">색상을 클릭하면 HEX 코드가 복사됩니다</p>

        <div class="theme-actions">
          <button id="downloadTokenBtn" class="action-btn primary">
            📥 토큰 다운로드
          </button>
          <button id="copyTokenBtn" class="action-btn secondary">
            📋 JSON 복사
          </button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <button id="openSidePanelBtn" class="footer-btn">
        📐 사이드 패널 열기
      </button>
      <button id="openOptionsBtn" class="footer-btn">
        ⚙️ 설정
      </button>
    </footer>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
